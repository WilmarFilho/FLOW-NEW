name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          
      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # ⚠️ ESSENCIAL: faz o job falhar se qualquer comando do script falhar
          script_stop: true
          script: |
            set -e

            cd /root/FLOW

            # Puxa o código mais recente
            git pull origin main

            # Injeta o .env de produção a partir do GitHub Secret ENV_PROD
            echo "${{ secrets.ENV_PROD }}" > .env

            # Reconstrói e sobe os conteineres (falha se o build falhar)
            docker compose down
            docker compose up -d --build 2>&1 | tee /tmp/deploy.log

            # Verifica se algum container saiu com erro após subir
            sleep 5
            FAILED=$(docker compose ps --filter "status=exited" --format "{{.Name}}" 2>/dev/null || true)
            if [ -n "$FAILED" ]; then
              echo "❌ Containers com falha: $FAILED"
              docker compose logs --tail=50
              exit 1
            fi

            echo "✅ Deploy concluido com sucesso!"

            # Limpa imagens antigas não utilizadas
            docker image prune -f

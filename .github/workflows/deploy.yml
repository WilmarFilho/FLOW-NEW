name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          # Passar como env var — NÃO inline no script (evita DRONE_SSH corrompendo .env multilinha)
          ENV_PROD: ${{ secrets.ENV_PROD }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_PROD
          script_stop: true
          script: |
            set -e
            cd /root/FLOW

            git pull origin main

            # printf preserva o conteúdo multilinha sem corrupção
            printf '%s' "$ENV_PROD" > .env

            docker compose down
            docker compose up -d --build 2>&1 | tee /tmp/deploy.log

            # Verifica se algum container caiu após subir
            sleep 5
            FAILED=$(docker compose ps --filter "status=exited" --format "{{.Name}}" 2>/dev/null || true)
            if [ -n "$FAILED" ]; then
              echo "❌ Containers com falha: $FAILED"
              docker compose logs --tail=50
              exit 1
            fi

            echo "✅ Deploy concluido com sucesso!"
            docker image prune -f


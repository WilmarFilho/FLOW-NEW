version: '3.8'

services:
  frontend:
    image: ${IMAGE_REGISTRY_PREFIX:-}flow_frontend:${IMAGE_TAG:-latest}
    ports:
      - target: 3000
        published: 3021
        protocol: tcp
        mode: ingress
    env_file:
      - .env.prod
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - edge
      - private_encrypted

  backend:
    image: ${IMAGE_REGISTRY_PREFIX:-}flow_backend:${IMAGE_TAG:-latest}
    ports:
      - target: 3000
        published: 3022
        protocol: tcp
        mode: ingress
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - edge
      - private_encrypted

  evolution:
    image: evoapicloud/evolution-api:latest
    ports:
      - target: 8080
        published: 8081
        protocol: tcp
        mode: ingress
    env_file:
      - .env.prod
    environment:
      - SERVER_PORT=8080
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - DATABASE_PROVIDER=postgresql
      # NOTE: Define EVO_DATABASE_CONNECTION_URI in .env.prod pointing to Supabase with ?schema=evolution
      - DATABASE_CONNECTION_URI=${EVO_DATABASE_CONNECTION_URI}
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - EVOLUTION_NODE_ID=node-1
    depends_on:
      - redis
    command: [ "node", "./dist/src/main.js" ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - edge
      - private_encrypted

  evolution-b:
    image: evoapicloud/evolution-api:latest
    env_file:
      - .env.prod
    environment:
      - SERVER_PORT=8080
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution-b
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${EVO_DATABASE_CONNECTION_URI}
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - EVOLUTION_NODE_ID=node-2
    depends_on:
      - redis
    command: [ "node", "./dist/src/main.js" ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - private_encrypted

  evolution-c:
    image: evoapicloud/evolution-api:latest
    env_file:
      - .env.prod
    environment:
      - SERVER_PORT=8080
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution-c
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${EVO_DATABASE_CONNECTION_URI}
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - EVOLUTION_NODE_ID=node-3
    depends_on:
      - redis
    command: [ "node", "./dist/src/main.js" ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - private_encrypted

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - private_encrypted

volumes:
  redis_data:

networks:
  edge:
    driver: overlay
  private_encrypted:
    driver: overlay
    driver_opts:
      encrypted: "true"

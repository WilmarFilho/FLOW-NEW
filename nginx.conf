# REDIRECIONAMENTOS HTTPS MANDATÓRIOS
server {
    if ($host = flow.nkwflow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name flow.nkwflow.com;
    return 404; # managed by Certbot
}

server {
    if ($host = api.flow.nkwflow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name api.flow.nkwflow.com;
    return 404; # managed by Certbot
}

server {
    if ($host = evolution.nkwflow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name evolution.nkwflow.com;
    return 404; # managed by Certbot
}
